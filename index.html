<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>生日快乐</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* 背景 */
.bg{
  position:fixed;
  inset:0;
  background:url('flowers.png') center/cover no-repeat;
  opacity:0;
  transition:opacity 1.5s ease;
  z-index:-1;
}
.bg.show{opacity:1;}

/* 容器 */
.container{
  width:min(90vw,420px);
  padding:24px;
  border-radius:18px;
  background:rgba(255,255,255,0.10);
  backdrop-filter:blur(10px);
}

h1{
  font-size:clamp(20px,5vw,32px);
  margin:0 0 10px;
}

/* 头像 */
.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  display:block;
  margin:10px auto;
  border:2px solid white;
}

button{
  margin-top:14px;
  padding:10px 18px;
  border:none;
  border-radius:999px;
  background:white;
  color:#333;
  cursor:pointer;
  font-size:14px;
}

.text{
  margin-top:16px;
  opacity:0;
  transition:opacity 1s ease;
  line-height:1.6;
}
.text.show{opacity:1;}

.final{
  margin-top:12px;
  opacity:0;
  transition:opacity 1.5s ease;
  font-size:18px;
}
.final.show{opacity:1;}

/* 花瓣 */
.petal{
  position:fixed;
  top:-10px;
  width:8px;
  height:8px;
  background:rgba(255,192,203,0.6);
  border-radius:50% 50% 50% 0;
  animation:fall linear infinite;
  pointer-events:none;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(360deg);
  }
}

</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="container">
  <h1>理理老师</h1>
  <img src="avatar.jpg" class="avatar" alt="avatar">

  <button id="btn" onclick="start()">点一下</button>

  <div class="text" id="text">
    希望你天天都开心😉
  </div>

  <div class="final" id="final">
    生日快乐！
  </div>
</div>

<audio id="music" preload="auto" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function start(){
  const bg=document.getElementById('bg');
  const text=document.getElementById('text');
  const btn=document.getElementById('btn');
  const music=document.getElementById('music');

  // 背景显示
  bg.classList.add('show');

  // 文本显示
  text.classList.add('show');

  // 按钮消失
  btn.style.display='none';

  // 音乐（防拦截）
  music.play().catch(()=>{
    console.log('音乐播放被拦截');
  });

  // 花瓣
  createPetals();

  // 结尾文字
  setTimeout(()=>{
    document.getElementById('final').classList.add('show');
  },1500);
}

function createPetals(){
  const count = window.innerWidth < 600 ? 8 : 12;

  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='petal';
    p.style.left=Math.random()*100+'vw';
    p.style.animationDuration=(4+Math.random()*4)+'s';
    p.style.opacity=Math.random()*0.5+0.3;
    document.body.appendChild(p);
  }
}
</script>

</body>
</html>
