<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* 背景 */
#bg{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:1.5s;
  z-index:-1;
}

#bg.show{opacity:1;}

.container{
  width:90%;
  max-width:420px;
  padding:20px;
  background:rgba(255,255,255,0.1);
  border-radius:16px;
  backdrop-filter:blur(10px);
}

.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  margin:10px auto;
}

button{
  margin-top:10px;
  padding:10px 18px;
  border:none;
  border-radius:999px;
  cursor:pointer;
}

.text,.final{
  opacity:0;
  transition:1s;
  margin-top:10px;
}

.show{opacity:1;}

</style>
</head>

<body>

<img id="bg" src="flowers.png">

<div class="container">
  <h1>理理老师</h1>
  <img class="avatar" src="avatar.jpg">

  <button onclick="start()">点一下</button>

  <div class="text" id="text">
    希望你天天开心😉
  </div>

  <div class="final" id="final">
    生日快乐！
  </div>
</div>

<audio id="music" loop>
  <source src="https://www.orangefreesounds.com/wp-content/uploads/2016/08/Happy-birthday-instrumental.mp3">
</audio>

<script>
function start(){
  document.getElementById('bg').classList.add('show');
  document.getElementById('text').classList.add('show');
  document.getElementById('final').classList.add('show');

  document.getElementById('music').play().catch(()=>{});

  document.querySelector('button').style.display='none';
}
</script>

</body>
</html>
