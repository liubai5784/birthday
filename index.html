<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
  overflow:hidden;
}

/* 背景 */
#bg{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:1.5s;
  z-index:-1;
}
#bg.show{opacity:1;}

/* 卡片 */
.box{
  width:90%;
  max-width:420px;
  padding:20px;
  background:rgba(0,0,0,0.35);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:16px;
}

/* 头像 */
.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  margin:10px auto;
  display:block;
}

/* 按钮 */
button{
  padding:10px 18px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  margin-top:10px;
}

/* 动画 */
.text,.final{
  opacity:0;
  transition:1s;
  margin-top:10px;
}

.show{opacity:1;}

#voiceBtn{
  display:none;
}

</style>
</head>

<body>

<img id="bg" src="flowers.jpg">

<div class="box">
  <h1>理理老师</h1>

  <img class="avatar" src="avatar.jpg">

  <button id="startBtn" onclick="start()">点一下</button>

  <div class="text" id="text">希望你天天开心 🌼</div>
  <div class="final" id="final">生日快乐！</div>

  <!-- 🎤 第二个按钮 -->
  <button id="voiceBtn" onclick="playVoice()">听祝福 🎤</button>
</div>

<audio id="music">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function start(){
  document.getElementById('bg').classList.add('show');
  document.getElementById('text').classList.add('show');
  document.getElementById('final').classList.add('show');

  document.getElementById('startBtn').style.display='none';

  // 显示第二按钮
  setTimeout(()=>{
    document.getElementById('voiceBtn').style.display='inline-block';
  },1200);
}

function playVoice(){
  const music = document.getElementById('music');

  // 每次从头播放（不叠加）
  music.pause();
  music.currentTime = 0;
  music.play().catch(()=>{});
}
</script>

</body>
</html>
