<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>生日快乐</title>

<style>
/* ====== 全局适配 ====== */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #111;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* ====== 背景 ====== */
.bg {
  position: fixed;
  inset: 0;
  background: url('flowers.jpg') center/cover no-repeat;
  opacity: 0;
  transition: opacity 1.5s ease;
  z-index: -1;
}

.bg.show { opacity: 1; }

/* ====== 容器（自适应屏幕） ====== */
.container {
  width: min(90vw, 420px);
  padding: clamp(16px, 4vw, 32px);
  border-radius: 18px;
  background: rgba(255,255,255,0.10);
  backdrop-filter: blur(10px);
}

h1 {
  font-size: clamp(20px, 5vw, 32px);
  margin-bottom: 10px;
}

/* ====== 头像（修复比例问题） ====== */
.avatar {
  width: clamp(60px, 18vw, 90px);
  aspect-ratio: 1 / 1;
  object-fit: cover;
  margin: 10px auto;
  display: block;
  border-radius: 50%;
  border: 2px solid white;
}

/* ====== 按钮 ====== */
button {
  margin-top: 16px;
  padding: 10px 18px;
  border: none;
  border-radius: 999px;
  background: white;
  color: #333;
  font-size: 14px;
  cursor: pointer;
}

/* ====== 文本 ====== */
.text {
  margin-top: 18px;
  opacity: 0;
  transition: opacity 1s ease;
  font-size: clamp(14px, 3.8vw, 16px);
  line-height: 1.6;
}

.text.show { opacity: 1; }

.final {
  margin-top: 14px;
  opacity: 0;
  font-size: clamp(16px, 4.5vw, 20px);
  transition: opacity 1.5s ease;
}

.final.show { opacity: 1; }

/* ====== 花瓣（轻量适配） ====== */
.petal {
  position: fixed;
  top: -10px;
  width: 8px;
  height: 8px;
  background: rgba(255,192,203,0.6);
  border-radius: 50% 50% 50% 0;
  animation: fall linear infinite;
  pointer-events: none;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}

</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="container">
  <h1>理理老师</h1>
  <img src="avatar.jpg" class="avatar">

  <button onclick="start()" id="btn">点一下</button>

  <div class="text" id="text">
    像你头像里的小花一样就很好 🌼
  </div>

  <div class="final" id="final">
    生日快乐。
  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function start() {
  document.getElementById('bg').classList.add('show');
  document.getElementById('text').classList.add('show');
  document.getElementById('music').play();

  document.getElementById('btn').style.display = 'none';

  createPetals();

  setTimeout(() => {
    document.getElementById('final').classList.add('show');
  }, 1500);
}

function createPetals() {
  const count = window.innerWidth < 600 ? 8 : 12;

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (4 + Math.random() * 4) + 's';
    p.style.opacity = Math.random() * 0.5 + 0.3;
    document.body.appendChild(p);
  }
}
</script>

</body>
</html>
